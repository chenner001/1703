<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>笔记本 · 手写笔记</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: text;
        }

        body {
            background: #e2ddcf;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', monospace;
            padding: 32px 20px;
        }

        /* 整体容器 */
        .book {
            width: 100%;
            max-width: 600px;
            position: relative;
            cursor: pointer;
        }

        /* 黑色封皮 - 竖向长方形 */
        .cover {
            background: #1e1a17;
            border-radius: 8px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            padding: 120px 20px;
            text-align: center;
            color: #e8e0c8;
            font-family: 'Georgia', serif;
            transition: all 0.2s;
            cursor: pointer;
            position: relative;
            z-index: 2;
            min-height: 500px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .cover h2 {
            font-size: 2rem;
            font-weight: 400;
            letter-spacing: 4px;
            margin-bottom: 12px;
            border-top: 1px solid #c2b28a;
            border-bottom: 1px solid #c2b28a;
            display: inline-block;
            padding: 12px 24px;
        }
        .cover p {
            margin-top: 32px;
            font-size: 0.85rem;
            opacity: 0.7;
            font-style: italic;
        }
        .cover:hover {
            background: #2a241f;
            transform: scale(0.99);
        }

        /* 内页（初始隐藏） */
        .notebook {
            display: none;
            background: #fffcf0;
            border-radius: 8px;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.12), 0 0 0 1px #e2d5bc;
            padding: 48px 40px 56px;
            position: relative;
            transition: transform 0.3s ease, opacity 0.3s ease;
            transform-origin: left center;
        }

        /* 横线背景 */
        .notebook {
            background-image: repeating-linear-gradient(
                #fffcf0,
                #fffcf0 28px,
                #e8e0ce 28px,
                #e8e0ce 29px
            );
            background-size: 100% 29px;
            background-repeat: repeat-y;
        }

        /* 纸张边缘阴影 */
        .notebook::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 8px;
            background: linear-gradient(180deg, rgba(0,0,0,0.05), transparent);
            pointer-events: none;
        }

        /* 红色左侧装订线 */
        .notebook::after {
            content: "";
            position: absolute;
            top: 0;
            left: 28px;
            width: 2px;
            height: 100%;
            background: repeating-linear-gradient(
                to bottom,
                #e65c4f,
                #e65c4f 12px,
                transparent 12px,
                transparent 24px
            );
            opacity: 0.5;
            pointer-events: none;
        }

        /* 关闭区域（左侧装订线附近） */
        .close-area {
            position: absolute;
            top: 0;
            left: 0;
            width: 60px;
            height: 100%;
            cursor: pointer;
            z-index: 10;
            background: rgba(0,0,0,0.01);
        }

        /* 日期样式 */
        .date {
            position: absolute;
            top: 20px;
            right: 28px;
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            color: #b99e6f;
            letter-spacing: 0.5px;
            z-index: 3;
            pointer-events: none;
        }

        /* 内容区，保证文字在横线格内对齐 */
        .content {
            position: relative;
            z-index: 2;
            font-family: 'Kalam', 'Caveat', 'Indie Flower', cursive;
            font-size: 1.6rem;
            line-height: 29px;
            letter-spacing: 0.3px;
            min-height: 300px;
            padding: 0 0 0 32px;
            pointer-events: auto;
        }

        /* 段落样式，模拟手写 */
        .content p {
            margin-bottom: 24px;
            line-height: 29px;
            white-space: pre-wrap;
            word-break: break-word;
        }

        /* 第一行缩进 */
        .content p:first-of-type {
            text-indent: 2em;
        }

        /* 文字完全透明，不可见 */
        .hidden-text {
            color: transparent;
            transition: color 0.05s ease;
        }

        /* 选中时文字变为深色 */
        .hidden-text::selection {
            color: #2c2b28;
            background: #f3e9ce;
        }
        .hidden-text::-moz-selection {
            color: #2c2b28;
            background: #f3e9ce;
        }

        /* 关闭动画 */
        .notebook.closing {
            transform: scaleX(0.9) scaleY(0.95);
            opacity: 0;
            transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.2s ease;
            pointer-events: none;
        }

        /* 手写字体 */
        @import url('https://fonts.googleapis.com/css2?family=Kalam:wght@300;400;700&family=Caveat:wght@400;500;600&family=Indie+Flower&display=swap');

        @media (max-width: 600px) {
            .notebook {
                padding: 32px 24px 40px;
            }
            .content {
                font-size: 1.2rem;
                line-height: 29px;
                padding-left: 24px;
            }
            .content p {
                margin-bottom: 20px;
            }
            .date {
                font-size: 0.7rem;
                top: 16px;
                right: 20px;
            }
            .close-area {
                width: 45px;
            }
            .cover {
                padding: 80px 20px;
                min-height: 450px;
            }
        }
    </style>
</head>
<body>
<div class="book" id="book">
    <!-- 黑色封皮 -->
    <div class="cover" id="cover">
        <h2>✧ 手记 ✧</h2>
        <p>点击打开</p>
    </div>

    <!-- 内页笔记本（初始隐藏） -->
    <div class="notebook" id="notebook">
        <div class="close-area" id="closeArea"></div>
        <div class="date">2025.3.17</div>
        <div class="content">
            <p class="hidden-text">“如果我有多一张船票，你会不会跟我走？”</p>
            <p class="hidden-text">如果我有勇气，我会跟自己走。</p>
        </div>
    </div>
</div>

<script>
    const cover = document.getElementById('cover');
    const notebook = document.getElementById('notebook');
    const closeArea = document.getElementById('closeArea');

    // 打开笔记本
    function openNotebook() {
        cover.style.display = 'none';
        notebook.style.display = 'block';
        notebook.classList.remove('closing');
    }

    // 关闭笔记本（带动画）
    function closeNotebook() {
        if (notebook.classList.contains('closing')) return;
        notebook.classList.add('closing');
        setTimeout(() => {
            notebook.style.display = 'none';
            cover.style.display = 'flex';
            notebook.classList.remove('closing');
        }, 250);
    }

    // 点击封皮打开
    cover.addEventListener('click', openNotebook);

    // 点击关闭区域（左侧）或内页背景关闭
    // 点击左侧关闭区域直接关闭
    closeArea.addEventListener('click', (e) => {
        e.stopPropagation();
        closeNotebook();
    });

    // 点击内页背景（.notebook）关闭（但排除点击在.content文字区域）
    notebook.addEventListener('click', (e) => {
        // 如果点击的目标是 .content 或其子元素，不关闭
        let target = e.target;
        if (target.closest('.content')) {
            return;
        }
        // 其他区域（背景、日期等）都关闭
        closeNotebook();
    });
</script>
</body>
</html>
