<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>1703室 · 失踪者白夜行</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f5f7fb;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            color: #2c3e4e;
        }

        .room-container {
            max-width: 1100px;
            width: 100%;
            background: #ffffff;
            border-radius: 2rem;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.03), 0 1px 2px rgba(0, 0, 0, 0.02);
            padding: 2rem 2rem 2.5rem 2rem;
        }

        .case-header {
            text-align: center;
            margin-bottom: 2.8rem;
            border-bottom: 1px solid #e9edf2;
            padding-bottom: 1.2rem;
        }
        .case-header h1 {
            font-size: 1.8rem;
            font-weight: 450;
            letter-spacing: 2px;
            color: #1a2c3a;
        }

        .desk-area {
            display: flex;
            justify-content: center;
            margin-bottom: 1rem;
        }
        .wooden-desk {
            background: #fefaf0;
            background-image: radial-gradient(circle at 20% 30%, rgba(210, 180, 140, 0.08) 1.5%, transparent 1.8%);
            background-size: 32px 32px;
            border-radius: 2rem;
            padding: 2.5rem 2rem;
            width: 100%;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.02), inset 0 1px 0 rgba(255, 255, 245, 0.8);
            border: 1px solid #ede9e0;
        }

        .desk-items {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 2.5rem;
            align-items: flex-end;
        }

        .item {
            background: #ffffff;
            border-radius: 1.5rem;
            padding: 1.5rem 1.2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.25s ease;
            width: 180px;
            border: 1px solid #eef2f7;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02);
        }
        .item:hover {
            transform: translateY(-6px);
            border-color: #d4dee8;
            box-shadow: 0 16px 28px -12px rgba(0, 0, 0, 0.1);
        }
        .item-icon {
            font-size: 3.2rem;
            margin-bottom: 0.8rem;
        }
        .item-name {
            font-weight: 500;
            font-size: 1rem;
            color: #2c4c6c;
        }
        .item-desc {
            font-size: 0.7rem;
            color: #8a9bb0;
            margin-top: 6px;
        }

        .quiet-footnote {
            text-align: center;
            font-size: 0.7rem;
            color: #bfc9d4;
            margin-top: 2.5rem;
            border-top: 1px solid #f0f2f6;
            padding-top: 1.5rem;
        }

        /* 笔记本弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 245, 0.94);
            backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        /* 竖向长方形封面 (无文字) */
        .notebook-cover {
            width: 480px;
            max-width: 85vw;
            aspect-ratio: 3 / 4;
            background: linear-gradient(145deg, #1a1a20 0%, #0f0f14 100%);
            border-radius: 12px;
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.25), inset 0 1px 0 rgba(255,255,255,0.05);
            cursor: pointer;
            transition: transform 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1px solid #3e3e48;
        }
        .notebook-cover:hover {
            transform: scale(1.01);
            background: #21212a;
        }
        .cover-icon {
            font-size: 4rem;
            opacity: 0.7;
            margin-bottom: 0.8rem;
        }
        .cover-decoration {
            width: 40px;
            height: 2px;
            background: #5a5a6e;
            margin-top: 1rem;
            border-radius: 2px;
        }

        /* 笔记本内页：白色横线纸，中间竖线，左右区域翻页 */
        .notebook-inner {
            width: 620px;
            max-width: 90vw;
            background: #ffffff;
            border-radius: 4px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.12);
            position: relative;
            border: 1px solid #e2dbc8;
            overflow: hidden;
        }
        /* 左右双栏容器 (中间竖线) */
        .notebook-split {
            display: flex;
            position: relative;
            min-height: 520px;
            background: #ffffff;
        }
        /* 左栏和右栏 各占一半 */
        .page-left, .page-right {
            flex: 1;
            padding: 2rem 1.6rem;
            font-family: 'Courier New', 'SF Mono', 'Segoe UI', monospace;
            font-size: 0.9rem;
            line-height: 1.85;
            color: #2c3f4f;
            background: #ffffff;
            /* 横线背景 */
            background-image: repeating-linear-gradient(
                to bottom,
                #e8e2d4 0px,
                #e8e2d4 1px,
                transparent 1px,
                transparent 32px
            );
            background-size: 100% 32px;
            background-position: top 20px left 0;
            white-space: pre-wrap;
            word-break: break-word;
            overflow-y: auto;
            min-height: 480px;
        }
        /* 中间竖线 */
        .notebook-split::after {
            content: '';
            position: absolute;
            top: 10%;
            bottom: 10%;
            left: 50%;
            width: 1px;
            background: #d6c8b0;
            transform: translateX(-50%);
            box-shadow: 0 0 2px #e9ddc5;
            pointer-events: none;
        }
        /* 左右翻页热区 (覆盖整个左右半区) */
        .page-click-left, .page-click-right {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 50%;
            cursor: pointer;
            z-index: 10;
            background: transparent;
        }
        .page-click-left {
            left: 0;
        }
        .page-click-right {
            right: 0;
        }
        .page-click-left:hover {
            background: linear-gradient(90deg, rgba(0,0,0,0.02), transparent);
        }
        .page-click-right:hover {
            background: linear-gradient(270deg, rgba(0,0,0,0.02), transparent);
        }
        .notebook-footer {
            display: flex;
            justify-content: center;
            padding: 12px 0;
            border-top: 1px solid #f0e8dc;
            background: #fefcf8;
            font-size: 0.7rem;
            color: #b8aa92;
            letter-spacing: 1px;
        }
        .notebook-close {
            position: absolute;
            top: 10px;
            right: 16px;
            background: transparent;
            border: none;
            font-size: 1.4rem;
            cursor: pointer;
            color: #b2a68c;
            width: 32px;
            height: 32px;
            border-radius: 30px;
            z-index: 25;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .notebook-close:hover {
            background: #ede3d4;
            color: #6f5e48;
        }
        /* 隐藏文字样式 */
        .hidden-reveal {
            background-color: transparent;
            color: transparent;
            user-select: text;
            display: inline-block;
            width: 100%;
        }
        .hidden-reveal::selection {
            background-color: #f5e5c0;
            color: #2e4a3b;
        }
        .hidden-reveal::-moz-selection {
            background-color: #f5e5c0;
            color: #2e4a3b;
        }

        /* 购物小票 */
        .receipt-modal {
            background: #fffef5;
            width: 380px;
            max-width: 85vw;
            padding: 1.6rem 1.8rem;
            font-family: 'Courier New', 'SF Mono', monospace;
            color: #2c3e2f;
            border-radius: 20px;
            border: 1px solid #ece2d0;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.05);
        }
        .receipt-title {
            text-align: center;
            font-weight: 500;
            border-bottom: 1px dashed #ddd0b6;
            padding-bottom: 8px;
            margin-bottom: 16px;
            font-size: 0.9rem;
        }
        .receipt-detail {
            font-size: 0.8rem;
            line-height: 1.55;
        }
        button.close-receipt {
            background: #f2efe6;
            border: 1px solid #e0d5c2;
            padding: 6px 0;
            width: 100%;
            border-radius: 40px;
            margin-top: 18px;
            font-family: inherit;
            font-size: 0.7rem;
            cursor: pointer;
            color: #5e6f5e;
        }

        @media (max-width: 680px) {
            .room-container { padding: 1.5rem; }
            .desk-items { gap: 1.2rem; }
            .item { width: 140px; padding: 1rem 0.8rem; }
            .page-left, .page-right { padding: 1.2rem; font-size: 0.75rem; min-height: 400px; }
            .notebook-split { min-height: 440px; }
        }
    </style>
</head>
<body>
<div class="room-container">
    <div class="case-header">
        <h1>1703室</h1>
    </div>
    <div class="desk-area">
        <div class="wooden-desk">
            <div class="desk-items">
                <!-- 笔记本电脑 -->
                <div class="item" id="laptopItem">
                    <div class="item-icon">💻</div>
                    <div class="item-name">笔记本电脑</div>
                    <div class="item-desc"></div>
                </div>
                <!-- 黑色笔记本 -->
                <div class="item" id="notebookItem">
                    <div class="item-icon">📔</div>
                    <div class="item-name">黑色笔记本</div>
                    <div class="item-desc"></div>
                </div>
                <!-- 购物小票 -->
                <div class="item" id="receiptItem">
                    <div class="item-icon">🧾</div>
                    <div class="item-name">购物小票</div>
                    <div class="item-desc"></div>
                </div>
            </div>
        </div>
    </div>
    <div class="quiet-footnote"></div>
</div>

<script>
    // ----- 笔记本内容：共3个跨页，第三页右侧为隐藏文字（需选中才显示）-----
    const pageSpreads = [
        {   // 第1页
            left: `日期：2025年2月10日\n\n今日待办\n\n10:00 需求评审会——V4.2版本迭代方案\n14:00 与设计组对齐首页改版细节（改期至周三）\n16:30 用户反馈数据整理\n18:00 提交本周周报`,
            right: `日期：2025年2月17日\n\n今日待办\n\n09:30 跨部门周会\n11:00 与UI组过视觉稿\n14:00 用户访谈×3（取消1位，实际完成2位）\n16:00 技术排期对齐（延期至明天）\n17:30 整理访谈记录`
        },
        {   // 第2页
            left: `日期：2025年2月24日\n\n本周重点\n\nV4.2版本需求冻结 —— 周三前完成最终确认\n年度产品规划PPT —— 周五下班前交初稿\n用户留存数据分析 —— 已完成，待汇报`,
            right: `（笔记本留白）\n\n\n\n\n\n\n\n\n\n\n—— 未写日期 ——`
        },
        {   // 第3页：右侧为需要选中才显示的文字
            left: `2025年3月10日\n\n夜场。一个人去看了电影。\n影厅很暗，只有银幕的光。\n散场后走在街上，三月风还有凉意。\n\n把票根留在了笔记本里。`,
            right: `<div style="padding: 0.5rem 0;"></div>
                    <span class="hidden-reveal">“如果多一张船票，你会不会跟我走？”<br>如果我有勇气，我会跟自己走。</span>`
        }
    ];
    
    let currentSpreadIdx = 0;
    let notebookOpened = false;
    let currentOverlay = null;
    let leftDiv = null, rightDiv = null;

    // 笔记本电脑：跳转指定链接
    function openLaptop() {
        window.open('https://github.com/chenner001/poi/blob/main/README.md#poi', '_blank');
    }

    // 渲染当前跨页（左右两栏）
    function renderSpread() {
        if (!leftDiv || !rightDiv) return;
        const spread = pageSpreads[currentSpreadIdx];
        leftDiv.innerHTML = spread.left.replace(/\n/g, '<br>');
        rightDiv.innerHTML = spread.right;
        // 确保隐藏文字样式透明（仅当第三页右侧）
        if (currentSpreadIdx === 2) {
            const hiddenSpans = rightDiv.querySelectorAll('.hidden-reveal');
            hiddenSpans.forEach(span => {
                span.style.color = 'transparent';
                span.style.backgroundColor = 'transparent';
            });
        }
        // 更新页码指示
        const footer = document.querySelector('.notebook-footer');
        if (footer) {
            footer.textContent = `${currentSpreadIdx+1} / ${pageSpreads.length}`;
        }
    }

    // 翻页函数
    function nextPage() {
        if (currentSpreadIdx < pageSpreads.length - 1) {
            currentSpreadIdx++;
            renderSpread();
        }
    }
    function prevPage() {
        if (currentSpreadIdx > 0) {
            currentSpreadIdx--;
            renderSpread();
        }
    }

    // 创建笔记本内页 (白色横线纸，中间竖线，左右点击翻页)
    function createNotebookInner() {
        const container = document.createElement('div');
        container.className = 'notebook-inner';
        container.style.position = 'relative';
        
        // 关闭按钮
        const closeBtn = document.createElement('button');
        closeBtn.innerHTML = '✕';
        closeBtn.className = 'notebook-close';
        
        // 左右双栏结构
        const splitWrapper = document.createElement('div');
        splitWrapper.className = 'notebook-split';
        
        leftDiv = document.createElement('div');
        leftDiv.className = 'page-left';
        rightDiv = document.createElement('div');
        rightDiv.className = 'page-right';
        
        splitWrapper.appendChild(leftDiv);
        splitWrapper.appendChild(rightDiv);
        
        // 左右热区 (覆盖整个半区)
        const leftClickZone = document.createElement('div');
        leftClickZone.className = 'page-click-left';
        const rightClickZone = document.createElement('div');
        rightClickZone.className = 'page-click-right';
        
        splitWrapper.appendChild(leftClickZone);
        splitWrapper.appendChild(rightClickZone);
        
        // 底部页码
        const footer = document.createElement('div');
        footer.className = 'notebook-footer';
        
        container.appendChild(closeBtn);
        container.appendChild(splitWrapper);
        container.appendChild(footer);
        
        // 绑定翻页事件
        leftClickZone.addEventListener('click', prevPage);
        rightClickZone.addEventListener('click', nextPage);
        
        // 初始渲染
        currentSpreadIdx = 0;
        renderSpread();
        
        // 关闭笔记本
        closeBtn.addEventListener('click', () => {
            if (currentOverlay) currentOverlay.remove();
            notebookOpened = false;
            currentOverlay = null;
        });
        
        return container;
    }
    
    // 黑色笔记本交互：竖向封面，点击后展示内页
    function openNotebook() {
        if (notebookOpened) return;
        
        const overlay = document.createElement('div');
        overlay.className = 'modal-overlay';
        currentOverlay = overlay;
        
        // 封面 (竖向长方形，无任何文字)
        const coverDiv = document.createElement('div');
        coverDiv.className = 'notebook-cover';
        coverDiv.innerHTML = `
            <div class="cover-icon">📓</div>
            <div class="cover-decoration"></div>
        `;
        overlay.appendChild(coverDiv);
        document.body.appendChild(overlay);
        
        const openInnerHandler = () => {
            if (notebookOpened) return;
            notebookOpened = true;
            coverDiv.remove();
            const notebookInner = createNotebookInner();
            overlay.appendChild(notebookInner);
            // 点击背景关闭
            overlay.addEventListener('click', function bgClose(e) {
                if (e.target === overlay) {
                    if (currentOverlay) currentOverlay.remove();
                    notebookOpened = false;
                    currentOverlay = null;
                }
            });
        };
        
        coverDiv.addEventListener('click', openInnerHandler);
        
        // 未翻开时点击背景关闭弹窗
        overlay.addEventListener('click', function(e) {
            if (e.target === overlay && !notebookOpened) {
                overlay.remove();
                notebookOpened = false;
                currentOverlay = null;
            }
        });
    }

    // 购物小票弹窗 (已删除便携水果盒)
    function openReceipt() {
        const overlay = document.createElement('div');
        overlay.className = 'modal-overlay';
        const receiptDiv = document.createElement('div');
        receiptDiv.className = 'receipt-modal';
        receiptDiv.innerHTML = `
            <div class="receipt-title">🧾 罗木便利店 · 购物小票</div>
            <div class="receipt-detail">
                时间：2025年03月17日  01:03:17<br/>
                店址：时光里公寓东侧 · 罗木便利店<br/>
                ─────────────────<br/>
                全麦吐司面包      ×2   ￥22.00<br/>
                饮用纯净水(550ml) ×3   ￥9.00<br/>
                混合坚果能量棒    ×4   ￥36.00<br/>
                便携湿巾          ×1   ￥5.00<br/>
                ─────────────────<br/>
                合计：¥72.00<br/>
                支付：微信支付（尾号3827）<br/>
                <hr style="border-color:#e0cfb6; margin: 10px 0;">
                <div style="font-size:0.65rem;">收银：赵敏 | 单号: 0332-8791</div>
            </div>
            <button class="close-receipt">关闭</button>
        `;
        overlay.appendChild(receiptDiv);
        document.body.appendChild(overlay);
        
        const closeBtn = receiptDiv.querySelector('.close-receipt');
        closeBtn.onclick = () => overlay.remove();
        overlay.onclick = (e) => { if(e.target === overlay) overlay.remove(); };
    }

    // 绑定事件
    document.getElementById('laptopItem').addEventListener('click', openLaptop);
    document.getElementById('notebookItem').addEventListener('click', openNotebook);
    document.getElementById('receiptItem').addEventListener('click', openReceipt);
</script>
</body>
</html>
