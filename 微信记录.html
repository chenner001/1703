<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: text;
        }

        body {
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: -apple-system, 'Segoe UI', 'Helvetica Neue', Helvetica, 'Microsoft YaHei', sans-serif;
            padding: 16px;
        }

        .wechat-window {
            width: 100%;
            max-width: 1200px;
            height: 90vh;
            min-height: 500px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.15);
            display: flex;
            overflow: hidden;
            position: relative;
        }

        .sidebar {
            width: 280px;
            background: #f7f7f7;
            border-right: 1px solid #e5e5e5;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .profile {
            padding: 20px 16px 12px;
            border-bottom: 1px solid #e5e5e5;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .avatar {
            width: 40px;
            height: 40px;
            background: #07c160;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 18px;
        }
        .user-info {
            flex: 1;
            margin-left: 12px;
        }
        .user-name {
            font-weight: 600;
            font-size: 15px;
        }
        .user-status {
            font-size: 12px;
            color: #888;
        }
        .more-btn {
            color: #888;
            cursor: default;
        }

        .search-bar {
            padding: 12px 16px;
        }
        .search-input {
            background: #e5e5e5;
            border-radius: 20px;
            padding: 6px 12px;
            font-size: 13px;
            color: #999;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
        }
        .chat-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            cursor: pointer;
            transition: background 0.2s;
            border-bottom: 1px solid #f0f0f0;
        }
        .chat-item:hover {
            background: #efefef;
        }
        .chat-item.active {
            background: #e8e8e8;
        }
        .chat-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #c4c4c4;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            color: white;
            margin-right: 12px;
            flex-shrink: 0;
        }
        .chat-info {
            flex: 1;
            min-width: 0;
        }
        .chat-name {
            font-size: 15px;
            font-weight: 500;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }
        .chat-time {
            font-size: 11px;
            color: #aaa;
            flex-shrink: 0;
            margin-left: 8px;
        }
        .chat-preview {
            font-size: 12px;
            color: #888;
            margin-top: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .unread-badge {
            background: #fa5151;
            color: white;
            border-radius: 10px;
            padding: 0 6px;
            font-size: 10px;
            line-height: 16px;
            margin-left: 6px;
            display: inline-block;
        }

        .main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .chat-header {
            padding: 14px 20px;
            border-bottom: 1px solid #e5e5e5;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fff;
        }
        .chat-header-name {
            font-weight: 600;
            font-size: 16px;
        }

        .message-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f9f9f9;
            display: flex;
            flex-direction: column;
        }
        .message {
            display: flex;
            margin-bottom: 16px;
            max-width: 80%;
        }
        .message.received {
            align-self: flex-start;
        }
        .message.sent {
            align-self: flex-end;
            flex-direction: row-reverse;
        }
        .bubble {
            background: white;
            padding: 8px 12px;
            border-radius: 12px;
            box-shadow: 0 1px 1px rgba(0,0,0,0.05);
            position: relative;
            word-break: break-word;
            max-width: 100%;
        }
        .message.sent .bubble {
            background: #95ec69;
        }
        .message-time {
            font-size: 11px;
            color: #aaa;
            margin: 0 8px;
            align-self: flex-end;
        }
        .read-status {
            font-size: 12px;
            margin-left: 6px;
            display: inline-block;
        }

        .input-area {
            border-top: 1px solid #e5e5e5;
            padding: 12px 16px;
            background: #fff;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .input-box {
            flex: 1;
            border: 1px solid #e5e5e5;
            border-radius: 20px;
            padding: 8px 14px;
            font-size: 14px;
            outline: none;
            resize: none;

        }
        .send-btn {
            background: #07c160;
            color: white;
            border: none;
            border-radius: 20px;
            padding: 6px 18px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .send-btn:hover {
            background: #06ae56;
        }

        .moments-view {
            flex: 1;
            overflow-y: auto;
            background: #f2f2f2;
            display: none;
            flex-direction: column;
        }
        .moments-view.active {
            display: flex;
        }
        .moments-header {
            background: #fff;
            padding: 30px 20px 16px;
            text-align: center;
            border-bottom: 1px solid #e5e5e5;
            position: relative;
        }
        .moments-bg {
            background: #07c160;
            height: 80px;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            opacity: 0.3;
        }
        .moment-item {
            background: white;
            margin: 10px 12px;
            border-radius: 12px;
            padding: 14px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .moment-header {
            display: flex;
            gap: 12px;
        }
        .moment-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #c4c4c4;

            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            flex-shrink: 0;
        }
        .moment-content {
            flex: 1;
        }
        .moment-name {
            font-weight: 600;
            font-size: 15px;
            margin-bottom: 6px;
        }
        .moment-text {
            font-size: 14px;
            line-height: 1.4;
            margin-bottom: 8px;
            word-break: break-word;
        }
        .moment-time {
            font-size: 11px;
            color: #aaa;
            margin-top: 6px;
        }

        .chat-view {
            display: flex;
            flex-direction: column;
            flex: 1;
            height: 100%;
        }
        .footer-nav {
            border-top: 1px solid #e5e5e5;
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            background: #f7f7f7;
        }
        .moments-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 20px;
            transition: background 0.2s;
            font-size: 13px;
            color: #576b95;
        }

            background: #e5e5e5;
        }

        @media (max-width: 760px) {

            .profile {

            .chat-avatar {

            }
            .bubble {

            }
            .input-box {
                font-size: 13px;
                padding: 6px 12px;
            }
            .send-btn {
                padding: 4px 14px;
                font-size: 13px;
            }
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #c1c1c1;
            border-radius: 3px;
        }
    </style>
</head>

                    showChatView();
                }
                currentContact = contact;
                if (contact.unread) contact.unread = false;
                renderChatList();
                renderMessageArea();
                updateChatHeader();
                document.getElementById('msgInput').value = '';
            });
            container.appendChild(item);
        });
    }

    function updateChatHeader() {
        document.getElementById('chatHeaderName').innerText = currentContact.name;
    }

    function renderMessageArea() {
        const area = document.getElementById('messageArea');
        if (!area) return;
        area.innerHTML = '';
        if (!currentContact.messages || currentContact.messages.length === 0) {
            const emptyHint = document.createElement('div');
            emptyHint.style.textAlign = 'center';
            emptyHint.style.color = '#aaa';
            emptyHint.style.padding = '40px';
            emptyHint.innerText = '暂无聊天记录，开始对话吧。';
            area.appendChild(emptyHint);
            return;
        }
        currentContact.messages.forEach(msg => {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${msg.type === 'sent' ? 'sent' : 'received'}`;
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.innerText = msg.text;
            const timeSpan = document.createElement('div');
            timeSpan.className = 'message-time';
            let timeStr = msg.time.split(' ')[1].slice(0,5);
            timeSpan.innerText = timeStr;
            msgDiv.appendChild(bubble);
            msgDiv.appendChild(timeSpan);
            if (msg.status === 'read') {
                const statusSpan = document.createElement('span');
                statusSpan.className = 'read-status';
                statusSpan.innerHTML = '✓✓';
                statusSpan.style.color = '#06ae56';
                bubble.appendChild(statusSpan);
            } else if (msg.status === 'unread') {
                const statusSpan = document.createElement('span');
                statusSpan.className = 'read-status';
                statusSpan.innerHTML = '✓';
                statusSpan.style.color = '#aaa';
                bubble.appendChild(statusSpan);
            }
            area.appendChild(msgDiv);
        });
        area.scrollTop = area.scrollHeight;
    }

    function sendMessage() {
        const inputBox = document.getElementById('msgInput');
        const text = inputBox.value.trim();
        if (!text) return;
        const newMsg = {
            type: "sent",
            text: text,
            time: new Date().toISOString().slice(0,16).replace('T',' '),
            status: "read"
        };
        if (!currentContact.messages) currentContact.messages = [];
        currentContact.messages.push(newMsg);
        currentContact.lastMsg = text;
        currentContact.lastTime = new Date().toLocaleDateString().slice(5);
        renderChatList();
        renderMessageArea();

        if (currentContact.id === "father") {
            fatherMsgCount++;
            if (fatherMsgCount === 3 && !fatherAutoReplied) {
                fatherAutoReplied = true;
                const autoReply = {
                    type: "received",
                    text: "别烦我，有事找你妈。",
                    time: new Date().toISOString().slice(0,16).replace('T',' '),
                    status: "read"
                };
                currentContact.messages.push(autoReply);
                currentContact.lastMsg = autoReply.text;
                currentContact.lastTime = autoReply.time.slice(5,10);
                renderChatList();
                renderMessageArea();
            }
        }
        inputBox.value = '';
    }

    function renderMoments() {
        const container = document.getElementById('momentsFeed');
        if (!container) return;
        container.innerHTML = '';
        momentsData.forEach(m => {
            const momentDiv = document.createElement('div');
            momentDiv.className = 'moment-item';
            momentDiv.innerHTML = `
                <div class="moment-header">
                    <div class="moment-avatar" style="background: ${m.avatarBg};">${m.avatarText}</div>
                    <div class="moment-content">
                        <div class="moment-name">${m.name}</div>
                        <div class="moment-text">${m.content}</div>
                        <div class="moment-time">${m.time}</div>
                    </div>
                </div>
            `;
            container.appendChild(momentDiv);
        });
    }

    function showChatView() {
        document.getElementById('chatView').style.display = 'flex';
        document.getElementById('momentsView').classList.remove('active');
        currentView = 'chat';
        renderMessageArea();
    }

    function showMomentsView() {
        document.getElementById('chatView').style.display = 'none';
        document.getElementById('momentsView').classList.add('active');
        currentView = 'moments';
        renderMoments();
    }

    function init() {
        renderChatList();
        renderMessageArea();
        updateChatHeader();
        const momentsBtn = document.getElementById('momentsBtn');
        momentsBtn.addEventListener('click', () => {
            showMomentsView();
        });
        const sendBtn = document.getElementById('sendBtn');
        sendBtn.addEventListener('click', sendMessage);
        const msgInput = document.getElementById('msgInput');
        msgInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
    }

    init();
</script>
</body>
</html>
